name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: Test (Bun ${{ matrix.bun-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        bun-version: ['latest', 'canary']

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ matrix.bun-version }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Test — router
        run: bun run test
        working-directory: packages/router

      - name: Test — compiler-ts
        run: bun run test
        working-directory: packages/compiler-ts

      - name: Test — cli
        run: bun run test
        working-directory: packages/cli

      - name: Test — vite-plugin-nml
        run: bun run test
        working-directory: packages/vite-plugin-nml

      - name: Test — mcp-server
        run: bun run test
        working-directory: packages/mcp-server
